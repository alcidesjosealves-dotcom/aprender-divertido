<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprender é Divertido!</title>
<meta name="description" content="App educativo para crianças de 7-8 anos">
<meta name="theme-color" content="#7F77DD">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Aprender!">
<link rel="manifest" href="manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f5f5f5;padding:1rem;}
#app{max-width:680px;margin:0 auto;}

/* LOADING */
#loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.95);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:32px;z-index:999;gap:12px;}
#loading-overlay p{font-size:14px;color:#888;}

/* LOGIN */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;text-align:center;padding:2rem;}
.logo-big{font-size:72px;margin-bottom:1rem;}
#login-screen h1{font-size:28px;font-weight:700;color:#1a1a1a;margin-bottom:8px;}
#login-screen p{font-size:15px;color:#666;margin-bottom:2rem;line-height:1.6;}
.google-btn{display:flex;align-items:center;gap:12px;padding:14px 28px;border-radius:12px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:16px;font-weight:500;color:#1a1a1a;box-shadow:0 2px 8px rgba(0,0,0,0.08);transition:all 0.15s;}
.google-btn:hover{border-color:#7F77DD;box-shadow:0 4px 12px rgba(127,119,221,0.25);}
.google-btn img{width:22px;height:22px;}

/* NAV TABS */
#nav-tabs{display:none;gap:4px;margin-bottom:1.5rem;background:#fff;border-radius:12px;padding:6px;border:0.5px solid #ddd;}
#nav-tabs.show{display:flex;}
.nav-tab{flex:1;padding:8px 4px;border-radius:8px;border:none;background:none;cursor:pointer;font-size:12px;color:#888;text-align:center;transition:all 0.15s;}
.nav-tab.active{background:#7F77DD;color:#fff;font-weight:500;}
.nav-tab .tab-icon{font-size:18px;display:block;margin-bottom:2px;}

/* TOPBAR */
#topbar{display:none;align-items:center;justify-content:space-between;margin-bottom:1rem;padding:10px 14px;background:#fff;border-radius:12px;border:0.5px solid #ddd;}
#topbar.show{display:flex;}
.user-info{display:flex;align-items:center;gap:10px;}
.user-avatar-sm{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid #7F77DD;font-size:20px;display:flex;align-items:center;justify-content:center;background:#EEEDFE;}
.user-name{font-size:14px;font-weight:500;color:#1a1a1a;}
.logout-btn{font-size:12px;color:#888;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}

/* SCORE BAR */
.score-bar{display:flex;justify-content:center;gap:20px;margin-bottom:1.5rem;}
.score-item{text-align:center;}
.score-num{font-size:24px;font-weight:600;color:#1a1a1a;}
.score-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;}

/* CATEGORIAS */
.cats{display:grid;grid-template-columns:repeat(auto-fit,minmax(85px,1fr));gap:8px;margin-bottom:1.5rem;}
.cat-btn{padding:8px 4px;border-radius:8px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:11px;color:#666;text-align:center;transition:all 0.15s;position:relative;}
.cat-btn.active{border-color:#7F77DD;color:#7F77DD;background:#EEEDFE;font-weight:500;}
.cat-btn.done-cat{border-color:#639922;background:#f8fff3;}
.cat-btn .cat-icon{font-size:22px;display:block;margin-bottom:4px;}
.cat-badge{position:absolute;top:-6px;right:-6px;background:#639922;color:#fff;font-size:10px;font-weight:700;border-radius:10px;padding:1px 5px;}

/* QUESTÃO */
.question-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.q-meta{font-size:12px;color:#aaa;margin-bottom:8px;display:flex;justify-content:space-between;}
.q-text{font-size:17px;color:#1a1a1a;font-weight:500;line-height:1.5;margin-bottom:1rem;}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt-btn{padding:10px 12px;border-radius:8px;border:1px solid #ccc;background:#f5f5f5;cursor:pointer;font-size:14px;color:#1a1a1a;text-align:center;transition:all 0.15s;}
.opt-btn:hover:not(:disabled){border-color:#7F77DD;color:#7F77DD;}
.opt-btn.correct{background:#EAF3DE;border-color:#639922;color:#3B6D11;font-weight:500;}
.opt-btn.wrong{background:#FCEBEB;border-color:#A32D2D;color:#791F1F;}
.opt-btn:disabled{cursor:default;}
.feedback{margin-top:1rem;padding:10px 14px;border-radius:8px;font-size:14px;display:none;}
.feedback.show{display:block;}
.feedback.ok{background:#EAF3DE;color:#3B6D11;}
.feedback.nok{background:#FCEBEB;color:#791F1F;}
.next-btn{display:none;width:100%;margin-top:1rem;padding:10px;border-radius:8px;border:1px solid #ccc;background:#f5f5f5;cursor:pointer;font-size:14px;color:#1a1a1a;font-weight:500;}
.next-btn.show{display:block;}

/* PROGRESSO */
.progress{height:4px;background:#eee;border-radius:4px;margin-bottom:1rem;overflow:hidden;}
.progress-fill{height:100%;background:#7F77DD;border-radius:4px;transition:width 0.3s;}

/* RESULTADO */
.result-card{text-align:center;padding:2rem 1rem;background:#fff;border:0.5px solid #ddd;border-radius:12px;}
.result-card h2{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:8px;}
.result-card p{color:#666;font-size:15px;margin-bottom:1rem;}
.restart-btn{padding:10px 24px;border-radius:8px;border:1px solid #ccc;background:#f5f5f5;cursor:pointer;font-size:15px;font-weight:500;color:#1a1a1a;}

/* REDAÇÃO */
.writing-area{width:100%;min-height:120px;padding:10px 12px;border-radius:8px;border:1px solid #ccc;background:#f9f9f9;font-size:15px;color:#1a1a1a;font-family:inherit;resize:vertical;line-height:1.6;}
.writing-area:focus{outline:none;border-color:#7F77DD;}
.word-count{font-size:12px;color:#aaa;margin-top:4px;text-align:right;}
.tip-box{background:#EEEDFE;border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#534AB7;line-height:1.6;}
.submit-btn{width:100%;margin-top:1rem;padding:10px;border-radius:8px;border:1px solid #AFA9EC;background:#EEEDFE;cursor:pointer;font-size:14px;color:#534AB7;font-weight:500;}
.submit-btn:disabled{opacity:0.5;cursor:default;}
.loading-txt{text-align:center;color:#888;font-size:14px;padding:1rem 0;display:none;}
.ai-feedback{margin-top:1rem;padding:14px;border-radius:8px;background:#f5f5f5;border:0.5px solid #ddd;font-size:14px;color:#1a1a1a;line-height:1.7;display:none;}
.ai-feedback.show{display:block;}

/* RANKING */
.ranking-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.ranking-card h3{font-size:16px;font-weight:600;color:#1a1a1a;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0;}
.rank-row:last-child{border-bottom:none;}
.rank-pos{font-size:18px;font-weight:700;width:28px;text-align:center;color:#888;}
.rank-pos.gold{color:#F59E0B;}
.rank-pos.silver{color:#9CA3AF;}
.rank-pos.bronze{color:#B45309;}
.rank-avatar{width:36px;height:36px;border-radius:50%;font-size:22px;display:flex;align-items:center;justify-content:center;background:#EEEDFE;flex-shrink:0;}
.rank-info{flex:1;}
.rank-name{font-size:14px;font-weight:500;color:#1a1a1a;}
.rank-pts{font-size:12px;color:#888;}
.rank-score{font-size:16px;font-weight:700;color:#7F77DD;}
.rank-me{background:#EEEDFE;border-radius:8px;padding:2px 6px;font-size:10px;color:#7F77DD;font-weight:600;}
.loading-rank{text-align:center;color:#888;font-size:14px;padding:2rem 0;}

/* PERFIL */
.profile-card{background:#fff;border:0.5px solid #ddd;border-radius:12px;padding:1.5rem;margin-bottom:1rem;text-align:center;}
.profile-avatar-big{font-size:64px;margin-bottom:8px;cursor:pointer;display:inline-block;}
.profile-name{font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:4px;}
.profile-email{font-size:13px;color:#888;margin-bottom:1.5rem;}
.profile-stats{display:flex;justify-content:center;gap:24px;margin-bottom:1.5rem;padding:1rem;background:#f9f9f9;border-radius:10px;}
.profile-stat{text-align:center;}
.profile-stat-num{font-size:22px;font-weight:700;color:#7F77DD;}
.profile-stat-label{font-size:11px;color:#888;}
.avatar-picker{margin-top:1rem;}
.avatar-picker h4{font-size:14px;color:#666;margin-bottom:10px;}
.avatar-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
.avatar-opt{font-size:28px;padding:6px;border-radius:8px;border:2px solid transparent;cursor:pointer;text-align:center;transition:all 0.15s;}
.avatar-opt.selected{border-color:#7F77DD;background:#EEEDFE;}
.save-avatar-btn{width:100%;margin-top:12px;padding:10px;border-radius:8px;border:1px solid #AFA9EC;background:#EEEDFE;cursor:pointer;font-size:14px;color:#534AB7;font-weight:500;}
.cat-progress{margin-top:1rem;}
.cat-progress h4{font-size:14px;color:#666;margin-bottom:10px;text-align:left;}
.cat-prog-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.cat-prog-icon{font-size:18px;width:24px;}
.cat-prog-label{font-size:13px;color:#444;width:80px;}
.cat-prog-bar{flex:1;height:6px;background:#eee;border-radius:3px;overflow:hidden;}
.cat-prog-fill{height:100%;background:#7F77DD;border-radius:3px;}
.cat-prog-pts{font-size:12px;color:#888;width:40px;text-align:right;}
</style>
</head>
<body>
<div id="loading-overlay"><span>📚</span><p>Carregando...</p></div>

<!-- LOGIN -->
<div id="login-screen" style="display:none;">
  <div class="logo-big">📚</div>
  <h1>Aprender é Divertido!</h1>
  <p>App educativo para crianças de 7-8 anos<br>com lógica, matemática, ciências e muito mais!</p>
  <button class="google-btn" onclick="loginGoogle()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Entrar com Google
  </button>
</div>

<!-- APP PRINCIPAL -->
<div id="main-app" style="display:none;">
  <div id="app">
    <div id="topbar">
      <div class="user-info">
        <div class="user-avatar-sm" id="topbar-avatar">😊</div>
        <span class="user-name" id="user-name"></span>
      </div>
      <button class="logout-btn" onclick="logoutUser()">Sair</button>
    </div>
    <div id="nav-tabs">
      <button class="nav-tab active" onclick="showTab('quiz')" id="tab-quiz"><span class="tab-icon">📚</span>Aprender</button>
      <button class="nav-tab" onclick="showTab('ranking')" id="tab-ranking"><span class="tab-icon">🏆</span>Ranking</button>
      <button class="nav-tab" onclick="showTab('profile')" id="tab-profile"><span class="tab-icon">👤</span>Perfil</button>
    </div>

    <!-- ABA QUIZ -->
    <div id="tab-quiz-content">
      <div class="score-bar">
        <div class="score-item"><div class="score-num" id="pts">0</div><div class="score-label">pontos</div></div>
        <div class="score-item"><div class="score-num" id="streak">0</div><div class="score-label">seguidas</div></div>
        <div class="score-item"><div class="score-num" id="done">0</div><div class="score-label">respondidas</div></div>
      </div>
      <div class="cats" id="cats"></div>
      <div class="progress"><div class="progress-fill" id="prog" style="width:0%"></div></div>
      <div id="quiz-area"></div>
    </div>

    <!-- ABA RANKING -->
    <div id="tab-ranking-content" style="display:none;">
      <div class="ranking-card">
        <h3>🏆 Top Alunos</h3>
        <div id="ranking-list"><div class="loading-rank">Carregando ranking...</div></div>
      </div>
    </div>

    <!-- ABA PERFIL -->
    <div id="tab-profile-content" style="display:none;">
      <div class="profile-card">
        <div class="profile-avatar-big" id="profile-avatar" onclick="toggleAvatarPicker()">😊</div>
        <div class="profile-name" id="profile-name"></div>
        <div class="profile-email" id="profile-email"></div>
        <div class="profile-stats">
          <div class="profile-stat"><div class="profile-stat-num" id="p-pts">0</div><div class="profile-stat-label">Pontos</div></div>
          <div class="profile-stat"><div class="profile-stat-num" id="p-done">0</div><div class="profile-stat-label">Respostas</div></div>
          <div class="profile-stat"><div class="profile-stat-num" id="p-cats">0</div><div class="profile-stat-label">Categorias</div></div>
        </div>
        <div class="avatar-picker" id="avatar-picker" style="display:none;">
          <h4>Escolha seu avatar:</h4>
          <div class="avatar-grid" id="avatar-grid"></div>
          <button class="save-avatar-btn" onclick="saveAvatar()">Salvar avatar</button>
        </div>
        <div class="cat-progress">
          <h4>Progresso por categoria:</h4>
          <div id="cat-progress-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, orderBy, query, limit, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7LNHyQmVUxhHSBJusAe3hDGsIGqbzFvA",
  authDomain: "aprender-divertido-75833.firebaseapp.com",
  projectId: "aprender-divertido-75833",
  storageBucket: "aprender-divertido-75833.firebasestorage.app",
  messagingSenderId: "1017796327584",
  appId: "1:1017796327584:web:4531b74f21173c755171c5"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
let currentUser = null;
let userProgress = {};
let selectedAvatar = '😊';

const AVATARS = ['😊','🦁','🐯','🐻','🦊','🐼','🐸','🦋','🐬','🦄','🐲','🦅','🌟','🚀','🎮','🎨','⚽','🎵'];

// ── AUTH ──
window.loginGoogle = async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { alert('Erro: ' + e.message); }
};
window.logoutUser = async () => { await signOut(auth); };

onAuthStateChanged(auth, async (user) => {
  document.getElementById('loading-overlay').style.display = 'none';
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('nav-tabs').classList.add('show');
    document.getElementById('topbar').classList.add('show');
    document.getElementById('user-name').textContent = user.displayName?.split(' ')[0] || 'Aluno';
    await loadProgress();
    renderCats(); renderQuestion(); renderProfile();
  } else {
    currentUser = null; userProgress = {};
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
    document.getElementById('nav-tabs').classList.remove('show');
    document.getElementById('topbar').classList.remove('show');
  }
});

// ── FIRESTORE ──
async function loadProgress() {
  if (!currentUser) return;
  const ref = doc(db, 'users', currentUser.uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    userProgress = snap.data();
    state.pts = userProgress.totalPoints || 0;
    state.done = userProgress.totalAnswered || 0;
    selectedAvatar = userProgress.avatar || '😊';
    document.getElementById('pts').textContent = state.pts;
    document.getElementById('done').textContent = state.done;
    document.getElementById('topbar-avatar').textContent = selectedAvatar;
  } else {
    await setDoc(ref, { name: currentUser.displayName, email: currentUser.email, totalPoints:0, totalAnswered:0, categories:{}, avatar:'😊', createdAt: serverTimestamp() });
  }
}

async function saveProgress(catId, points) {
  if (!currentUser) return;
  const ref = doc(db, 'users', currentUser.uid);
  const prev = userProgress?.categories?.[catId] || {};
  try {
    await updateDoc(ref, {
      totalPoints: state.pts, totalAnswered: state.done,
      [`categories.${catId}.totalPoints`]: (prev.totalPoints||0)+points,
      [`categories.${catId}.totalAnswered`]: (prev.totalAnswered||0)+1,
      [`categories.${catId}.lastPlayed`]: serverTimestamp(),
    });
    if(!userProgress.categories) userProgress.categories={};
    if(!userProgress.categories[catId]) userProgress.categories[catId]={};
    userProgress.categories[catId].totalPoints = (prev.totalPoints||0)+points;
    userProgress.categories[catId].totalAnswered = (prev.totalAnswered||0)+1;
    userProgress.totalPoints = state.pts;
    userProgress.totalAnswered = state.done;
  } catch(e){}
}

async function saveCategoryComplete(catId) {
  if (!currentUser) return;
  try {
    await updateDoc(doc(db,'users',currentUser.uid), {
      [`categories.${catId}.completed`]: true,
      [`categories.${catId}.completedAt`]: serverTimestamp(),
    });
    if(!userProgress.categories) userProgress.categories={};
    if(!userProgress.categories[catId]) userProgress.categories[catId]={};
    userProgress.categories[catId].completed = true;
  } catch(e){}
}

window._saveProgress = saveProgress;
window._saveCategoryComplete = saveCategoryComplete;

// ── RANKING ──
window.loadRanking = async function() {
  const list = document.getElementById('ranking-list');
  list.innerHTML = '<div class="loading-rank">Carregando...</div>';
  try {
    const q = query(collection(db,'users'), orderBy('totalPoints','desc'), limit(20));
    const snap = await getDocs(q);
    if (snap.empty) { list.innerHTML='<div class="loading-rank">Nenhum jogador ainda.</div>'; return; }
    const medals = ['🥇','🥈','🥉'];
    const posClass = ['gold','silver','bronze'];
    let html = '';
    let pos = 0;
    snap.forEach(d => {
      pos++;
      const data = d.data();
      const isMe = d.id === currentUser?.uid;
      const avatar = data.avatar || '😊';
      const name = data.name?.split(' ')[0] || 'Aluno';
      const pts = data.totalPoints || 0;
      html += `<div class="rank-row">
        <div class="rank-pos ${posClass[pos-1]||''}">${medals[pos-1]||pos}</div>
        <div class="rank-avatar">${avatar}</div>
        <div class="rank-info">
          <div class="rank-name">${name} ${isMe?'<span class="rank-me">Você</span>':''}</div>
          <div class="rank-pts">${data.totalAnswered||0} respostas</div>
        </div>
        <div class="rank-score">${pts}</div>
      </div>`;
    });
    list.innerHTML = html;
  } catch(e) { list.innerHTML='<div class="loading-rank">Erro ao carregar ranking.</div>'; }
};

// ── PERFIL ──
window.renderProfile = function() {
  if (!currentUser) return;
  document.getElementById('profile-avatar').textContent = selectedAvatar;
  document.getElementById('profile-name').textContent = currentUser.displayName || 'Aluno';
  document.getElementById('profile-email').textContent = currentUser.email || '';
  document.getElementById('p-pts').textContent = userProgress.totalPoints || 0;
  document.getElementById('p-done').textContent = userProgress.totalAnswered || 0;
  const cats = Object.keys(userProgress.categories || {});
  document.getElementById('p-cats').textContent = cats.filter(c => userProgress.categories[c]?.completed).length;
  // avatar grid
  const grid = document.getElementById('avatar-grid');
  grid.innerHTML = AVATARS.map(a => `<div class="avatar-opt${a===selectedAvatar?' selected':''}" onclick="selectAvatarOpt('${a}')">${a}</div>`).join('');
  // cat progress
  const progList = document.getElementById('cat-progress-list');
  progList.innerHTML = CATEGORIES.map(c => {
    const cp = userProgress?.categories?.[c.id];
    const pts = cp?.totalPoints || 0;
    const maxPts = QUESTIONS[c.id].length * (c.id==='writing'?15:10);
    const pct = Math.min(100, Math.round((pts/maxPts)*100));
    return `<div class="cat-prog-row">
      <div class="cat-prog-icon">${c.icon}</div>
      <div class="cat-prog-label">${c.label}</div>
      <div class="cat-prog-bar"><div class="cat-prog-fill" style="width:${pct}%"></div></div>
      <div class="cat-prog-pts">${pts}pts</div>
    </div>`;
  }).join('');
};

window.toggleAvatarPicker = function() {
  const p = document.getElementById('avatar-picker');
  p.style.display = p.style.display==='none' ? 'block' : 'none';
};

window.selectAvatarOpt = function(a) {
  selectedAvatar = a;
  document.querySelectorAll('.avatar-opt').forEach(el => el.classList.toggle('selected', el.textContent===a));
};

window.saveAvatar = async function() {
  if (!currentUser) return;
  try {
    await updateDoc(doc(db,'users',currentUser.uid), { avatar: selectedAvatar });
    userProgress.avatar = selectedAvatar;
    document.getElementById('profile-avatar').textContent = selectedAvatar;
    document.getElementById('topbar-avatar').textContent = selectedAvatar;
    document.getElementById('avatar-picker').style.display = 'none';
    alert('Avatar salvo! 🎉');
  } catch(e) { alert('Erro ao salvar avatar.'); }
};

// ── TABS ──
window.showTab = function(tab) {
  ['quiz','ranking','profile'].forEach(t => {
    document.getElementById(`tab-${t}-content`).style.display = t===tab ? 'block' : 'none';
    document.getElementById(`tab-${t}`).classList.toggle('active', t===tab);
  });
  if (tab==='ranking') window.loadRanking();
  if (tab==='profile') window.renderProfile();
};

// ── DADOS ──
const CATEGORIES = [
  {id:'logic',label:'Lógica',icon:'🔷'},

window.renderCats = function() {
  document.getElementById('cats').innerHTML = CATEGORIES.map(c => {
    const completed = userProgress?.categories?.[c.id]?.completed;
    return `<button class="cat-btn${state.cat===c.id?' active':''}${completed?' done-cat':''}" onclick="selectCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>${c.label}
      ${completed?'<span class="cat-badge">✓</span>':''}
    </button>`;
  }).join('');
};

window.selectCat = function(id){state.cat=id;state.idx=0;state.answered=false;renderCats();renderQuestion();};

window.renderQuestion = function(){
  const area=document.getElementById('quiz-area');
  if(!state.cat){area.innerHTML='<p style="text-align:center;color:#888;font-size:15px;padding:1rem 0;">Escolha uma categoria acima para começar!</p>';return;}
  const qs=QUESTIONS[state.cat];
  if(state.idx>=qs.length){renderResult();return;}
  document.getElementById('prog').style.width=Math.round((state.idx/qs.length)*100)+'%';
  state.cat==='writing'?renderWriting(qs[state.idx]):renderMCQ(qs[state.idx]);
};

window.renderMCQ = function(q){
  const qs=QUESTIONS[state.cat];const cat=CATEGORIES.find(c=>c.id===state.cat);
  document.getElementById('quiz-area').innerHTML=`
    <div class="question-card">
      <div class="q-meta"><span>${cat.icon} ${cat.label}</span><span>Pergunta ${state.idx+1} de ${qs.length}</span></div>
      <div class="q-text">${q.q}</div>
      <div class="options">${q.opts.map((o,i)=>`<button class="opt-btn" id="opt${i}" onclick="answer(${i})">${o}</button>`).join('')}</div>
      <div class="feedback" id="fb"></div>
      <button class="next-btn" id="nxt" onclick="next()">Próxima pergunta →</button>
    </div>`;
};

      <textarea class="writing-area" id="wtxt" placeholder="Escreva aqui..." oninput="updateCount(${q.minWords})"></textarea>
      <div class="word-count" id="wcount">0 palavras (mínimo ${q.minWords})</div>
      <div class="loading-txt" id="wloading">✨ Avaliando sua redação com IA...</div>
      <div class="ai-feedback" id="wfb"></div>
      <button class="submit-btn" id="wsubmit" onclick="submitWriting()" disabled>Enviar para correção ✨</button>
      <button class="next-btn" id="nxt" onclick="next()">Próxima atividade →</button>
    </div>`;
};

window.updateCount = function(min){
  const txt=document.getElementById('wtxt').value.trim();
  const w=txt?txt.split(/\s+/).length:0;
  document.getElementById('wcount').textContent=w+' palavra'+(w!==1?'s':'')+(w<min?` (mínimo ${min})`:'  ✓');
  document.getElementById('wsubmit').disabled=w<min;
};

window.submitWriting = async function(){
  const txt=document.getElementById('wtxt').value.trim();
  const q=QUESTIONS['writing'][state.idx];
  document.getElementById('wsubmit').disabled=true;
  document.getElementById('wloading').style.display='block';
  document.getElementById('wtxt').disabled=true;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,
        system:'Você é um professor carinhoso para crianças de 7-8 anos. Avalie a redação positivamente. Aponte 2 pontos positivos e 1 sugestão simples. Use emojis. Máximo 5 frases.',
        messages:[{role:'user',content:`Tema: "${q.prompt}"\nRedação: "${txt}"\nAvalie para criança de 7-8 anos.`}]})});
    const data=await resp.json();
    const text=data.content&&data.content[0]?data.content[0].text:'Muito bem! Continue praticando!';
    document.getElementById('wloading').style.display='none';
    const fb=document.getElementById('wfb');fb.className='ai-feedback show';
    fb.innerHTML='<strong>✨ Correção:</strong><br><br>'+text.replace(/\n/g,'<br>');
  }catch(e){
    document.getElementById('wloading').style.display='none';
    document.getElementById('wfb').className='ai-feedback show';
    document.getElementById('wfb').innerHTML='✅ Parabéns por escrever! Continue praticando!';
  }
  state.pts+=15;state.done++;
  document.getElementById('pts').textContent=state.pts;
  document.getElementById('done').textContent=state.done;
  document.getElementById('nxt').className='next-btn show';
  await window._saveProgress(state.cat,15);
};

window.answer = async function(i){
  if(state.answered)return;
  state.answered=true;
  const q=QUESTIONS[state.cat][state.idx];
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  document.getElementById('opt'+q.ans).classList.add('correct');
  state.done++;
  const ok=i===q.ans;
  if(ok){document.getElementById('opt'+i).classList.add('correct');state.pts+=10;state.streak++;document.getElementById('fb').className='feedback show ok';document.getElementById('fb').textContent='✓ Correto! '+q.exp;}
  else{document.getElementById('opt'+i).classList.add('wrong');state.streak=0;document.getElementById('fb').className='feedback show nok';document.getElementById('fb').textContent='✗ Quase! '+q.exp;}
  document.getElementById('pts').textContent=state.pts;
  document.getElementById('streak').textContent=state.streak;
  document.getElementById('done').textContent=state.done;
  document.getElementById('nxt').className='next-btn show';
  await window._saveProgress(state.cat,ok?10:0);
};

window.next = function(){state.idx++;state.answered=false;renderQuestion();};

window.renderResult = async function(){
  document.getElementById('prog').style.width='100%';
  const cat=CATEGORIES.find(c=>c.id===state.cat);
  document.getElementById('quiz-area').innerHTML=`
    <div class="result-card">
      <div style="font-size:48px;margin-bottom:12px;">🏆</div>
      <h2>Parabéns!</h2>
      <p>Você terminou <strong>${cat.label}</strong>!<br>com <strong>${state.pts} pontos</strong> no total!</p>
      <p style="font-size:13px;color:#888;margin-bottom:1.5rem;">Progresso salvo na sua conta ☁️</p>
      <button class="restart-btn" onclick="restart()">Escolher outra categoria</button>
    </div>`;
  await window._saveCategoryComplete(state.cat);
  renderCats();
};

window.restart = function(){state.cat=null;state.idx=0;state.answered=false;renderCats();renderQuestion();};

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>
</body>
</html>

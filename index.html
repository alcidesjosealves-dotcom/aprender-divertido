<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:system-ui,sans-serif;background:#f5f5f5;padding:1rem;min-height:100vh;}
#app{max-width:660px;margin:0 auto;}
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:999;}
#loading span{font-size:48px;}#loading p{font-size:14px;color:#888;}
.hidden{display:none!important;}
#login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:85vh;text-align:center;padding:2rem;}
#login .icon{font-size:72px;margin-bottom:1rem;}
#login h1{font-size:26px;font-weight:700;color:#1a1a1a;margin-bottom:8px;}
#login p{font-size:15px;color:#666;margin-bottom:2rem;line-height:1.6;}
.gbtn{display:flex;align-items:center;gap:12px;padding:14px 28px;border-radius:12px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:16px;font-weight:500;color:#1a1a1a;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.gbtn:hover{border-color:#7F77DD;}
#topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding:8px 12px;background:#fff;border-radius:12px;border:.5px solid #ddd;}
.uinfo{display:flex;align-items:center;gap:10px;}
.uname{font-size:14px;font-weight:500;color:#1a1a1a;}
.uemail{font-size:11px;color:#aaa;}
.lbtn{font-size:12px;color:#999;background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.scores{display:flex;justify-content:center;gap:20px;margin-bottom:1.25rem;}
.sc{text-align:center;}
.scn{font-size:24px;font-weight:600;color:#1a1a1a;}
.scl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;}
.cats{display:grid;grid-template-columns:repeat(auto-fit,minmax(85px,1fr));gap:8px;margin-bottom:1.25rem;}
.cat{padding:8px 4px;border-radius:8px;border:1.5px solid #ddd;background:#fff;cursor:pointer;font-size:11px;color:#666;text-align:center;transition:all .15s;position:relative;}
.cat.active{border-color:#7F77DD;color:#7F77DD;background:#EEEDFE;font-weight:500;}
.cat.done{border-color:#22C55E;background:#f0fff4;}
.cat .ci{font-size:22px;display:block;margin-bottom:4px;}
.cat .ck{position:absolute;top:3px;right:5px;font-size:11px;color:#22C55E;}
.prog{height:4px;background:#eee;border-radius:4px;margin-bottom:1rem;overflow:hidden;}
.prog-fill{height:100%;background:#7F77DD;border-radius:4px;transition:width .3s;}
.card{background:#fff;border:.5px solid #ddd;border-radius:12px;padding:1.25rem;margin-bottom:1rem;}
.qmeta{font-size:12px;color:#aaa;margin-bottom:8px;display:flex;justify-content:space-between;}
.qtxt{font-size:17px;color:#1a1a1a;font-weight:500;line-height:1.5;margin-bottom:1rem;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.opt{padding:10px 12px;border-radius:8px;border:1px solid #ccc;background:#f5f5f5;cursor:pointer;font-size:14px;color:#1a1a1a;text-align:center;transition:all .15s;}
.opt:hover:not(:disabled){border-color:#7F77DD;color:#7F77DD;}
.opt.ok{background:#EAF3DE;border-color:#639922;color:#3B6D11;font-weight:500;}
.opt.no{background:#FCEBEB;border-color:#A32D2D;color:#791F1F;}
.opt:disabled{cursor:default;}
.fb{margin-top:1rem;padding:10px 14px;border-radius:8px;font-size:14px;display:none;}
.fb.show{display:block;}.fb.ok{background:#EAF3DE;color:#3B6D11;}.fb.no{background:#FCEBEB;color:#791F1F;}
.nxt{display:none;width:100%;margin-top:1rem;padding:10px;border-radius:8px;border:1px solid #ccc;background:#f5f5f5;cursor:pointer;font-size:14px;color:#1a1a1a;font-weight:500;}
.nxt.show{display:block;}
.wtxt{width:100%;min-height:120px;padding:10px 12px;border-radius:8px;border:1px solid #ccc;background:#f9f9f9;font-size:15px;font-family:inherit;resize:vertical;line-height:1.6;}
.wtxt:focus{outline:none;border-color:#7F77DD;}
.wcount{font-size:12px;color:#aaa;margin-top:4px;text-align:right;}
.tip{background:#EEEDFE;border-radius:8px;padding:10px 14px;margin-bottom:1rem;font-size:13px;color:#534AB7;line-height:1.6;}
.sbtn{width:100%;margin-top:1rem;padding:10px;border-radius:8px;border:1px solid #AFA9EC;background:#EEEDFE;cursor:pointer;font-size:14px;color:#534AB7;font-weight:500;}
.sbtn:disabled{opacity:.5;cursor:default;}
.ltxt{text-align:center;color:#888;font-size:14px;padding:1rem 0;display:none;}
.aifb{margin-top:1rem;padding:14px;border-radius:8px;background:#f5f5f5;border:.5px solid #ddd;font-size:14px;color:#1a1a1a;line-height:1.7;display:none;}
.aifb.show{display:block;}
.result{text-align:center;padding:2rem 1rem;}
.result h2{font-size:22px;font-weight:600;color:#1a1a1a;margin-bottom:8px;}
.result p{color:#666;font-size:15px;margin-bottom:1.5rem;}
.rbtn{padding:10px 24px;border-radius:8px;border:1px solid #ccc;background:#f5f5f5;cursor:pointer;font-size:15px;font-weight:500;color:#1a1a1a;}
.rank-row{display:flex;align-items:center;gap:10px;padding:10px 8px;border-radius:8px;background:#f9f9f9;margin-bottom:6px;}
.rank-row.me{background:#EEEDFE;}
.rpos{font-size:18px;width:28px;text-align:center;}
.rav{width:36px;height:36px;border-radius:50%;object-fit:cover;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.rinfo{flex:1;}.rname{font-size:14px;font-weight:500;color:#1a1a1a;}.rsub{font-size:11px;color:#888;}
.rpts{font-size:16px;font-weight:700;color:#7F77DD;}
.pcard{text-align:center;padding:1.5rem;}
.pavatarwrap{position:relative;display:inline-block;margin-bottom:12px;}
.pcambiar{position:absolute;bottom:0;right:0;background:#7F77DD;color:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#foto-input{display:none;}
.pupload{font-size:12px;color:#7F77DD;margin-bottom:8px;min-height:16px;}
.pname{font-size:20px;font-weight:600;color:#1a1a1a;margin-bottom:4px;}
.pemail{font-size:13px;color:#888;margin-bottom:1.5rem;}
.pstats{display:flex;justify-content:center;gap:20px;padding:1rem;background:#f9f9f9;border-radius:10px;margin-bottom:1.5rem;}
.pst{text-align:center;}.pstn{font-size:22px;font-weight:700;color:#7F77DD;}.pstl{font-size:11px;color:#888;}
.pcats-done{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.pcatdone{padding:4px 10px;border-radius:20px;background:#EEEDFE;color:#7F77DD;font-size:12px;font-weight:500;}
#tabs{display:flex;gap:4px;margin-bottom:1.25rem;background:#fff;border-radius:12px;padding:6px;border:.5px solid #ddd;}
.tab{flex:1;padding:8px 4px;border-radius:8px;border:none;background:none;cursor:pointer;font-size:11px;color:#888;text-align:center;transition:all .15s;}
.tab .ti{font-size:18px;display:block;margin-bottom:2px;}
.tab.active{background:#7F77DD;color:#fff;font-weight:500;}
</style>
</head>

let user=null,state={cat:null,idx:0,pts:0,streak:0,done:0,answered:false,completedCats:{}};

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function login(){auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>alert('Erro: '+e.message));}
function doLogout(){auth.signOut();}

auth.onAuthStateChanged(async u=>{
  hide('loading');
  if(u){user=u;hide('login');show('main');renderTopbar();await loadProgress();renderCats();renderQuestion();}
  else{user=null;hide('main');show('login');}
});

async function loadProgress(){
  try{const s=await db.collection('users').doc(user.uid).get();if(s.exists){const d=s.data();state.pts=d.pts||0;state.done=d.done||0;state.completedCats=d.completedCats||{};}}catch(e){}
  updateScoreUI();
}

async function saveProgress(){
  if(!user)return;
  try{await db.collection('users').doc(user.uid).set({name:user.displayName||'Jogador',photoURL:user.photoURL||'',pts:state.pts,done:state.done,completedCats:state.completedCats,updatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});}catch(e){}
}

async function loadRanking(){
  try{
    const s=await db.collection('users').orderBy('pts','desc').limit(10).get();
    const medals=['🥇','🥈','🥉'];let html='';let i=0;
    s.forEach(d=>{
      const data=d.data(),isMe=d.id===user?.uid;
      const av=data.photoURL?`<img class="rav" src="${data.photoURL}" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">`:`<div class="rav">👤</div>`;
      html+=`<div class="rank-row${isMe?' me':''}">${av}<span class="rpos">${medals[i]||(i+1)+'º'}</span><div class="rinfo"><div class="rname">${data.name||'Jogador'}${isMe?' (você)':''}</div><div class="rsub">${Object.keys(data.completedCats||{}).length} categorias</div></div><div class="rpts">${data.pts||0} pts</div></div>`;
      i++;
    });
    document.getElementById('rlist').innerHTML=html||'<p style="color:#aaa;text-align:center;padding:1rem">Seja o primeiro! 🚀</p>';
  }catch(e){}
}

async function uploadFoto(input){
  const file=input.files[0];if(!file)return;
  if(file.size>3*1024*1024){alert('Foto maior que 3MB. Use uma menor.');return;}
  const prog=document.getElementById('uprogress');prog.textContent='Enviando foto...';
  try{
    const ref=storage.ref('avatars/'+user.uid);
    const task=ref.put(file);
    task.on('state_changed',snap=>{prog.textContent='Enviando... '+Math.round(snap.bytesTransferred/snap.totalBytes*100)+'%';});
    await task;
    const url=await ref.getDownloadURL();
    await user.updateProfile({photoURL:url});
    await db.collection('users').doc(user.uid).set({photoURL:url},{merge:true});
    prog.textContent='✅ Foto atualizada!';
    renderTopbar();renderPerfil();
    setTimeout(()=>{prog.textContent='';},3000);
  }catch(e){prog.textContent='Erro ao enviar.';}
  input.value='';
}

function renderTopbar(){
  const av=document.getElementById('uav');
  av.innerHTML=user.photoURL?`<img src="${user.photoURL}" style="width:36px;height:36px;border-radius:50%;border:2px solid #7F77DD;object-fit:cover;">`:`<div style="width:36px;height:36px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid #7F77DD;">👤</div>`;
  document.getElementById('uname').textContent=user.displayName||'Jogador';
  document.getElementById('uemail').textContent=user.email||'';
}

function showTab(tab){
  ['quiz','ranking','perfil'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('hidden',t!==tab));
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['quiz','ranking','perfil'][i]===tab));
  if(tab==='ranking')loadRanking();
  if(tab==='perfil')renderPerfil();
}

function renderPerfil(){
  const pav=document.getElementById('pav');
  if(user.photoURL)pav.outerHTML=`<img id="pav" src="${user.photoURL}" style="width:80px;height:80px;border-radius:50%;border:3px solid #7F77DD;object-fit:cover;cursor:pointer;" onclick="document.getElementById('foto-input').click()">`;
  else pav.outerHTML=`<div id="pav" style="width:80px;height:80px;border-radius:50%;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:48px;border:3px solid #7F77DD;cursor:pointer;" onclick="document.getElementById('foto-input').click()">👤</div>`;
  document.getElementById('pname').textContent=user.displayName||'Jogador';
  document.getElementById('pemail').textContent=user.email||'';
  document.getElementById('ppts').textContent=state.pts;
  document.getElementById('pdone').textContent=state.done;
  const cats=Object.keys(state.completedCats);
  document.getElementById('pcats').textContent=cats.length;
  document.getElementById('pcatsdone').innerHTML=cats.length?cats.map(c=>{const cat=CATS.find(x=>x.id===c);return cat?`<span class="pcatdone">${cat.icon} ${cat.label}</span>`:''}).join(''):'<span style="color:#aaa;font-size:13px">Nenhuma ainda 💪</span>';
}

function renderCats(){
  document.getElementById('cats').innerHTML=CATS.map(c=>{
    const done=state.completedCats[c.id];
    return`<button class="cat${state.cat===c.id?' active':''}${done?' done':''}" onclick="selectCat('${c.id}')">${done?'<span class="ck">✓</span>':''}<span class="ci">${c.icon}</span>${c.label}</button>`;
  }).join('');
}

function selectCat(id){state.cat=id;state.idx=0;state.answered=false;renderCats();renderQuestion();}

function renderQuestion(){
  const area=document.getElementById('quiz');
  if(!state.cat){area.innerHTML='<p style="text-align:center;color:#888;padding:2rem 0;font-size:15px">👆 Escolha uma categoria!</p>';return;}
  const qs=Q[state.cat];if(state.idx>=qs.length){renderResult();return;}
  document.getElementById('prog').style.width=Math.round(state.idx/qs.length*100)+'%';
  state.cat==='writing'?renderWriting(qs[state.idx]):renderMCQ(qs[state.idx]);
}

function renderMCQ(q){
  const cat=CATS.find(c=>c.id===state.cat);
  document.getElementById('quiz').innerHTML=`<div class="card"><div class="qmeta"><span>${cat.icon} ${cat.label}</span><span>${state.idx+1}/${Q[state.cat].length}</span></div><div class="qtxt">${q.q}</div><div class="opts">${q.opts.map((o,i)=>`<button class="opt" id="o${i}" onclick="answer(${i})">${o}</button>`).join('')}</div><div class="fb" id="fb"></div><button class="nxt" id="nxt" onclick="next()">Próxima →</button></div>`;
}

function renderWriting(q){
  document.getElementById('quiz').innerHTML=`<div class="card"><div class="qmeta"><span>✏️ Redação</span><span>${state.idx+1}/${Q.writing.length}</span></div><div class="qtxt">${q.prompt}</div><div class="tip">${q.tip}</div><textarea class="wtxt" id="wtxt" placeholder="Escreva aqui..." oninput="wcount(${q.minWords})"></textarea><div class="wcount" id="wcount">0 palavras (mín. ${q.minWords})</div><div class="ltxt" id="ltxt">✨ Avaliando...</div><div class="aifb" id="aifb"></div><button class="sbtn" id="sbtn" onclick="submitW()" disabled>Enviar ✨</button><button class="nxt" id="nxt" onclick="next()">Próxima →</button></div>`;
}

function wcount(min){const t=document.getElementById('wtxt').value.trim();const w=t?t.split(/\s+/).length:0;document.getElementById('wcount').textContent=w+' palavra'+(w!==1?'s':'')+(w<min?' (mín. '+min+')':'  ✓');document.getElementById('sbtn').disabled=w<min;}

async function submitW(){
  const txt=document.getElementById('wtxt').value.trim();const q=Q.writing[state.idx];
  document.getElementById('sbtn').disabled=true;document.getElementById('ltxt').style.display='block';document.getElementById('wtxt').disabled=true;
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:'Você é um professor carinhoso para crianças de 7-8 anos. Aponte 2 pontos positivos e 1 sugestão simples. Use emojis. Máximo 5 frases curtas.',messages:[{role:'user',content:'Tema: "'+q.prompt+'"\nRedação: "'+txt+'"'}]})});
    const d=await r.json();document.getElementById('ltxt').style.display='none';
    const fb=document.getElementById('aifb');fb.className='aifb show';fb.innerHTML='<strong>✨ Correção:</strong><br><br>'+(d.content?.[0]?.text||'Muito bem!').replace(/\n/g,'<br>');
  }catch{document.getElementById('ltxt').style.display='none';document.getElementById('aifb').className='aifb show';document.getElementById('aifb').innerHTML='✅ Parabéns! Continue praticando!';}
  state.pts+=15;state.done++;updateScoreUI();await saveProgress();document.getElementById('nxt').className='nxt show';
}

async function answer(i){
  if(state.answered)return;state.answered=true;const q=Q[state.cat][state.idx];
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);document.getElementById('o'+q.ans).classList.add('ok');state.done++;
  if(i===q.ans){document.getElementById('o'+i).classList.add('ok');state.pts+=10;state.streak++;document.getElementById('fb').className='fb show ok';document.getElementById('fb').textContent='✓ Correto! '+q.exp;}
  else{document.getElementById('o'+i).classList.add('no');state.streak=0;document.getElementById('fb').className='fb show no';document.getElementById('fb').textContent='✗ Quase! '+q.exp;}
  updateScoreUI();await saveProgress();document.getElementById('nxt').className='nxt show';
}

function updateScoreUI(){document.getElementById('pts').textContent=state.pts;document.getElementById('streak').textContent=state.streak;document.getElementById('done').textContent=state.done;}
function next(){state.idx++;state.answered=false;renderQuestion();}

async function renderResult(){
  document.getElementById('prog').style.width='100%';const cat=CATS.find(c=>c.id===state.cat);
  state.completedCats[state.cat]=true;await saveProgress();renderCats();
  document.getElementById('quiz').innerHTML=`<div class="card result"><div style="font-size:48px;margin-bottom:12px">🏆</div><h2>Parabéns!</h2><p>Você terminou <strong>${cat.label}</strong>!<br>Total: <strong>${state.pts} pontos</strong></p><button class="rbtn" onclick="restart()">Outra categoria</button></div>`;
}

function restart(){state.cat=null;state.idx=0;state.answered=false;renderCats();renderQuestion();}
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js');
</script>

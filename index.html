<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprender é Divertido!</title>
<meta name="description" content="App educativo para crianças de 7-8 anos">
<meta name="theme-color" content="#7F77DD">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Aprender!">
<link rel="manifest" href="manifest.json">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f5f5f5; padding: 1rem; }
#app { max-width: 680px; margin: 0 auto; }

/* LOGIN */
#login-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:80vh; text-align:center; padding:2rem; }
#login-screen .logo { font-size:64px; margin-bottom:1rem; }
#login-screen h1 { font-size:26px; font-weight:600; color:#1a1a1a; margin-bottom:8px; }
#login-screen p { font-size:15px; color:#666; margin-bottom:2rem; line-height:1.6; }
.google-btn { display:flex; align-items:center; gap:12px; padding:12px 24px; border-radius:10px; border:1.5px solid #ddd; background:#fff; cursor:pointer; font-size:15px; font-weight:500; color:#1a1a1a; box-shadow:0 1px 4px rgba(0,0,0,0.08); transition:all 0.15s; }
.google-btn:hover { border-color:#7F77DD; box-shadow:0 2px 8px rgba(127,119,221,0.2); }
.google-btn img { width:20px; height:20px; }

/* TOPBAR */
#topbar { display:none; align-items:center; justify-content:space-between; margin-bottom:1.5rem; padding:10px 14px; background:#fff; border-radius:12px; border:0.5px solid #ddd; }
#topbar.show { display:flex; }
.user-info { display:flex; align-items:center; gap:10px; }
.user-avatar { width:32px; height:32px; border-radius:50%; object-fit:cover; }
.user-name { font-size:14px; font-weight:500; color:#1a1a1a; }
.logout-btn { font-size:12px; color:#888; background:none; border:none; cursor:pointer; padding:4px 8px; border-radius:6px; }
.logout-btn:hover { background:#f0f0f0; }

/* HEADER */
.header { text-align:center; margin-bottom:1.5rem; }
.header h1 { font-size:22px; font-weight:500; color:#1a1a1a; }
.header p { font-size:14px; color:#666; margin-top:4px; }

/* SCORE */
.score-bar { display:flex; justify-content:center; gap:24px; margin-bottom:1.5rem; }
.score-item { text-align:center; }
.score-num { font-size:24px; font-weight:500; color:#1a1a1a; }
.score-label { font-size:12px; color:#888; }

/* CATEGORIAS */
.cats { display:grid; grid-template-columns:repeat(auto-fit, minmax(90px, 1fr)); gap:8px; margin-bottom:1.5rem; }
.cat-btn { padding:8px 4px; border-radius:8px; border:1.5px solid #ddd; background:#fff; cursor:pointer; font-size:12px; color:#666; text-align:center; transition:all 0.15s; position:relative; }
.cat-btn.active { border-color:#7F77DD; color:#7F77DD; background:#EEEDFE; font-weight:500; }
.cat-btn.done-cat { border-color:#639922; }
.cat-btn .cat-icon { font-size:20px; display:block; margin-bottom:4px; }
.cat-badge { position:absolute; top:-6px; right:-6px; background:#639922; color:#fff; font-size:10px; font-weight:600; border-radius:10px; padding:1px 5px; }

/* QUESTÃO */
.question-card { background:#fff; border:0.5px solid #ddd; border-radius:12px; padding:1.25rem; margin-bottom:1rem; }
.q-meta { font-size:12px; color:#aaa; margin-bottom:8px; display:flex; justify-content:space-between; }
.q-text { font-size:17px; color:#1a1a1a; font-weight:500; line-height:1.5; margin-bottom:1rem; }
.options { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.opt-btn { padding:10px 12px; border-radius:8px; border:1px solid #ccc; background:#f5f5f5; cursor:pointer; font-size:14px; color:#1a1a1a; text-align:center; transition:all 0.15s; }
.opt-btn:hover:not(:disabled) { border-color:#7F77DD; color:#7F77DD; }
.opt-btn.correct { background:#EAF3DE; border-color:#639922; color:#3B6D11; font-weight:500; }
.opt-btn.wrong { background:#FCEBEB; border-color:#A32D2D; color:#791F1F; }
.opt-btn:disabled { cursor:default; }
.feedback { margin-top:1rem; padding:10px 14px; border-radius:8px; font-size:14px; display:none; }
.feedback.show { display:block; }
.feedback.ok { background:#EAF3DE; color:#3B6D11; }
.feedback.nok { background:#FCEBEB; color:#791F1F; }
.next-btn { display:none; width:100%; margin-top:1rem; padding:10px; border-radius:8px; border:1px solid #ccc; background:#f5f5f5; cursor:pointer; font-size:14px; color:#1a1a1a; font-weight:500; }
.next-btn.show { display:block; }

/* PROGRESSO */
.progress { height:4px; background:#eee; border-radius:4px; margin-bottom:1rem; overflow:hidden; }
.progress-fill { height:100%; background:#7F77DD; border-radius:4px; transition:width 0.3s; }

/* RESULTADO */
.result-card { text-align:center; padding:2rem 1rem; background:#fff; border:0.5px solid #ddd; border-radius:12px; }
.result-card h2 { font-size:22px; font-weight:500; color:#1a1a1a; margin-bottom:8px; }
.result-card p { color:#666; font-size:15px; margin-bottom:1.5rem; }
.restart-btn { padding:10px 24px; border-radius:8px; border:1px solid #ccc; background:#f5f5f5; cursor:pointer; font-size:15px; font-weight:500; color:#1a1a1a; }

/* REDAÇÃO */
.writing-area { width:100%; min-height:120px; padding:10px 12px; border-radius:8px; border:1px solid #ccc; background:#f9f9f9; font-size:15px; color:#1a1a1a; font-family:inherit; resize:vertical; line-height:1.6; }
.writing-area:focus { outline:none; border-color:#7F77DD; }
.word-count { font-size:12px; color:#aaa; margin-top:4px; text-align:right; }
.tip-box { background:#EEEDFE; border-radius:8px; padding:10px 14px; margin-bottom:1rem; font-size:13px; color:#534AB7; line-height:1.6; }
.submit-btn { width:100%; margin-top:1rem; padding:10px; border-radius:8px; border:1px solid #AFA9EC; background:#EEEDFE; cursor:pointer; font-size:14px; color:#534AB7; font-weight:500; }
.submit-btn:disabled { opacity:0.5; cursor:default; }
.loading-txt { text-align:center; color:#888; font-size:14px; padding:1rem 0; display:none; }
.ai-feedback { margin-top:1rem; padding:14px; border-radius:8px; background:#f5f5f5; border:0.5px solid #ddd; font-size:14px; color:#1a1a1a; line-height:1.7; display:none; }
.ai-feedback.show { display:block; }

/* HISTÓRICO */
.history-card { background:#fff; border:0.5px solid #ddd; border-radius:12px; padding:1.25rem; margin-bottom:1rem; }
.history-card h3 { font-size:16px; font-weight:500; color:#1a1a1a; margin-bottom:1rem; }
.history-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #f0f0f0; font-size:14px; color:#444; }
.history-row:last-child { border-bottom:none; }
.history-pts { font-weight:600; color:#7F77DD; }

/* LOADING GERAL */
#loading-overlay { position:fixed; inset:0; background:rgba(255,255,255,0.9); display:flex; align-items:center; justify-content:center; font-size:32px; z-index:999; }
</style>
</head>
<body>

<div id="loading-overlay">⏳</div>

<!-- TELA DE LOGIN -->
<div id="login-screen" style="display:none;">
  <div class="logo">📚</div>
  <h1>Aprender é Divertido!</h1>
  <p>App educativo para crianças de 7-8 anos<br>com lógica, matemática, ciências e muito mais!</p>
  <button class="google-btn" onclick="loginGoogle()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
    Entrar com Google
  </button>
</div>

<!-- APP PRINCIPAL -->
<div id="main-app" style="display:none;">
  <div id="app">
    <div id="topbar">
      <div class="user-info">
        <img class="user-avatar" id="user-avatar" src="" alt="">
        <span class="user-name" id="user-name"></span>
      </div>
      <button class="logout-btn" onclick="logoutUser()">Sair</button>
    </div>
    <div class="header">
      <h1>Aprender é divertido!</h1>
      <p>Escolha uma categoria e responda as perguntas</p>
    </div>
    <div class="score-bar">
      <div class="score-item"><div class="score-num" id="pts">0</div><div class="score-label">pontos</div></div>
      <div class="score-item"><div class="score-num" id="streak">0</div><div class="score-label">seguidas</div></div>
      <div class="score-item"><div class="score-num" id="done">0</div><div class="score-label">respondidas</div></div>
    </div>
    <div class="cats" id="cats"></div>
    <div class="progress"><div class="progress-fill" id="prog" style="width:0%"></div></div>
    <div id="quiz-area"></div>
  </div>
</div>

<!-- Firebase SDKs -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, arrayUnion, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7LNHyQmVUxhHSBJusAe3hDGsIGqbzFvA",
  authDomain: "aprender-divertido-75833.firebaseapp.com",
  projectId: "aprender-divertido-75833",
  storageBucket: "aprender-divertido-75833.firebasestorage.app",
  messagingSenderId: "1017796327584",
  appId: "1:1017796327584:web:4531b74f21173c755171c5"
};

const firebaseApp = initializeApp(firebaseConfig);
const auth = getAuth(firebaseApp);
const db = getFirestore(firebaseApp);
let currentUser = null;
let userProgress = {};

// ─── AUTH ───────────────────────────────────────────
window.loginGoogle = async () => {
  const provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); }
  catch(e) { alert('Erro ao entrar: ' + e.message); }
};

window.logoutUser = async () => {
  await signOut(auth);
};

onAuthStateChanged(auth, async (user) => {
  document.getElementById('loading-overlay').style.display = 'none';
  if (user) {
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-app').style.display = 'block';
    document.getElementById('topbar').classList.add('show');
    document.getElementById('user-name').textContent = user.displayName?.split(' ')[0] || 'Aluno';
    document.getElementById('user-avatar').src = user.photoURL || '';
    await loadProgress();
    renderCats();
    renderQuestion();
  } else {
    currentUser = null;
    userProgress = {};
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
    document.getElementById('topbar').classList.remove('show');
  }
});

// ─── FIRESTORE ──────────────────────────────────────
async function loadProgress() {
  if (!currentUser) return;
  const ref = doc(db, 'users', currentUser.uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    userProgress = snap.data();
    state.pts = userProgress.totalPoints || 0;
    state.done = userProgress.totalAnswered || 0;
    document.getElementById('pts').textContent = state.pts;
    document.getElementById('done').textContent = state.done;
  } else {
    await setDoc(ref, { name: currentUser.displayName, email: currentUser.email, totalPoints: 0, totalAnswered: 0, categories: {}, createdAt: serverTimestamp() });
  }
}

async function saveProgress(catId, points, correct) {
  if (!currentUser) return;
  const ref = doc(db, 'users', currentUser.uid);
  const catKey = `categories.${catId}`;
  try {
    await updateDoc(ref, {
      totalPoints: state.pts,
      totalAnswered: state.done,
      [catKey + '.lastPlayed']: serverTimestamp(),
      [catKey + '.totalPoints']: (userProgress?.categories?.[catId]?.totalPoints || 0) + points,
      [catKey + '.totalAnswered']: (userProgress?.categories?.[catId]?.totalAnswered || 0) + 1,
    });
  } catch(e) { console.log('Erro ao salvar:', e); }
}

async function saveCategoryComplete(catId, score) {
  if (!currentUser) return;
  const ref = doc(db, 'users', currentUser.uid);
  const catKey = `categories.${catId}`;
  try {
    await updateDoc(ref, {
      [catKey + '.completed']: true,
      [catKey + '.lastScore']: score,
      [catKey + '.completedAt']: serverTimestamp(),
    });
    if (!userProgress.categories) userProgress.categories = {};
    if (!userProgress.categories[catId]) userProgress.categories[catId] = {};
    userProgress.categories[catId].completed = true;
  } catch(e) { console.log('Erro ao salvar conclusão:', e); }
}

// expõe para uso global
window._saveProgress = saveProgress;
window._saveCategoryComplete = saveCategoryComplete;

// ─── DADOS ──────────────────────────────────────────
const CATEGORIES = [
  { id:'logic', label:'Lógica', icon:'🔷' },
  { id:'math', label:'Matemática', icon:'➕' },
  { id:'memory', label:'Memória', icon:'🧠' },
  { id:'3d', label:'Formas 3D', icon:'🔺' },
  { id:'science', label:'Ciências', icon:'🔬' },
  { id:'geo', label:'Geografia', icon:'🌍' },
  { id:'pt', label:'Português', icon:'📖' },
  { id:'en', label:'Inglês', icon:'🇬🇧' },
  { id:'writing', label:'Redação', icon:'✏️' },
];
window.CATEGORIES = CATEGORIES;

const QUESTIONS = {
  logic: [
    { q:'Qual vem a seguir? 🔴 🔵 🔴 🔵 🔴 ___', opts:['🔵','🔴','🟡','🟢'], ans:0, exp:'O padrão alterna: vermelho, azul, vermelho, azul...' },
    { q:'Se todos os gatos têm 4 patas e Mimi é um gato, quantas patas tem Mimi?', opts:['2','3','4','5'], ans:2, exp:'Mimi é um gato, então tem 4 patas!' },
    { q:'Qual não pertence? Maçã 🍎 Banana 🍌 Cenoura 🥕 Uva 🍇', opts:['Maçã','Banana','Cenoura','Uva'], ans:2, exp:'Cenoura é um legume. As outras são frutas.' },
    { q:'João é mais alto que Pedro. Pedro é mais alto que Ana. Quem é o mais baixo?', opts:['João','Pedro','Ana','Todos iguais'], ans:2, exp:'João > Pedro > Ana, então Ana é a mais baixa.' },
    { q:'Qual número vem a seguir? 2 → 4 → 6 → 8 → ?', opts:['9','10','11','12'], ans:1, exp:'A sequência soma 2 a cada vez: 8+2 = 10!' },
  ],
  math: [
    { q:'Quanto é 15 + 8?', opts:['21','22','23','24'], ans:2, exp:'15 + 8 = 23.' },
    { q:'Maria tem 20 figurinhas. Deu 7 para o amigo. Quantas sobraram?', opts:['11','12','13','14'], ans:2, exp:'20 - 7 = 13 figurinhas.' },
    { q:'Quanto é 4 × 3?', opts:['10','11','12','13'], ans:2, exp:'4 × 3 = 12. É como somar 4+4+4!' },
    { q:'Pizza com 8 fatias. 3 pessoas comem 2 cada. Quantas sobram?', opts:['1','2','3','4'], ans:1, exp:'3×2=6 comidas. 8-6=2 sobram.' },
    { q:'Qual é a metade de 18?', opts:['7','8','9','10'], ans:2, exp:'18 ÷ 2 = 9.' },
  ],
  memory: [
    { q:'Lembra: 🐶 🐱 🐸 🦋. Qual NÃO estava na lista?', opts:['Cachorro','Gato','Pássaro','Sapo'], ans:2, exp:'Pássaro não estava. A lista era: cachorro, gato, sapo e borboleta.' },
    { q:'Qual cor NÃO aparece na bandeira do Brasil?', opts:['Verde','Amarelo','Azul','Vermelho'], ans:3, exp:'A bandeira tem verde, amarelo, azul e branco — não tem vermelho!' },
    { q:'Qual dia vem DEPOIS de quarta-feira?', opts:['Terça','Quinta','Sexta','Segunda'], ans:1, exp:'Segunda, terça, quarta, QUINTA...' },
    { q:'Quantas letras tem a palavra ESCOLA?', opts:['5','6','7','8'], ans:1, exp:'E-S-C-O-L-A = 6 letras.' },
    { q:'Qual fruta é amarela por fora?', opts:['Morango','Melancia','Banana','Uva'], ans:2, exp:'A banana é amarela por fora!' },
  ],
  '3d': [
    { q:'Qual formato tem 6 faces quadradas iguais?', opts:['Esfera','Pirâmide','Cubo','Cilindro'], ans:2, exp:'O cubo tem 6 faces quadradas iguais!' },
    { q:'Quantos lados tem um triângulo?', opts:['2','3','4','5'], ans:1, exp:'Tri = três lados!' },
    { q:'Qual objeto tem forma de esfera?', opts:['Caixa','Bola','Lápis','Livro'], ans:1, exp:'A bola tem formato de esfera!' },
    { q:'Pirâmide de base quadrada: quantas faces?', opts:['3','4','5','6'], ans:2, exp:'4 faces triangulares + 1 base quadrada = 5 faces!' },
    { q:'Qual forma tem 1 face curva e nenhum vértice?', opts:['Cubo','Pirâmide','Cilindro','Esfera'], ans:3, exp:'A esfera tem só superfície curva, sem arestas ou vértices!' },
  ],
  science: [
    { q:'O que as plantas precisam para fotossíntese?', opts:['Suco e açúcar','Luz solar e água','Sal e areia','Chuva e gelo'], ans:1, exp:'As plantas usam luz solar, água e CO₂!' },
    { q:'Qual é o maior planeta do Sistema Solar?', opts:['Terra','Marte','Júpiter','Saturno'], ans:2, exp:'Júpiter — cabe mais de 1.300 Terras dentro dele!' },
    { q:'O que acontece com a água a 100°C?', opts:['Vira gelo','Vira vapor','Vira mel','Fica igual'], ans:1, exp:'A 100°C a água ferve e vira vapor!' },
    { q:'Qual animal é mamífero?', opts:['Cobra','Sapo','Golfinho','Papagaio'], ans:2, exp:'O golfinho amamenta filhotes e respira ar!' },
    { q:'De onde vem a luz da Lua?', opts:['A Lua brilha sozinha','Reflexo do Sol','Reflexo da Terra','Estrelas atrás dela'], ans:1, exp:'A Lua reflete a luz do Sol!' },
  ],
  geo: [
    { q:'Qual é a capital do Brasil?', opts:['São Paulo','Rio de Janeiro','Brasília','Salvador'], ans:2, exp:'Brasília é a capital federal desde 1960!' },
    { q:'Qual é o maior país do mundo em área?', opts:['Brasil','China','EUA','Rússia'], ans:3, exp:'A Rússia tem mais de 17 milhões de km²!' },
    { q:'O Rio Amazonas fica em qual continente?', opts:['África','Europa','América do Sul','Ásia'], ans:2, exp:'O Rio Amazonas fica na América do Sul!' },
    { q:'Qual continente tem maior população?', opts:['Europa','América','África','Ásia'], ans:3, exp:'A Ásia tem mais de 4 bilhões de pessoas!' },
    { q:'Qual oceano banha a costa do Brasil?', opts:['Pacífico','Atlântico','Índico','Ártico'], ans:1, exp:'O Oceano Atlântico banha a costa leste do Brasil!' },
  ],
  pt: [
    { q:'Plural correto de "pão"?', opts:['Pãos','Pães','Pãoes','Pãs'], ans:1, exp:'O plural de pão é pães!' },
    { q:'Qual está escrita corretamente?', opts:['Excessão','Exeção','Exceção','Exessão'], ans:2, exp:'A forma correta é "exceção"!' },
    { q:'Quantas sílabas tem "borboleta"?', opts:['3','4','5','6'], ans:1, exp:'Bor-bo-le-ta = 4 sílabas!' },
    { q:'Qual é uma vogal?', opts:['B','P','E','T'], ans:2, exp:'As vogais são A, E, I, O, U!' },
    { q:'Feminino de "leão"?', opts:['Leãoa','Leona','Leã','Leoa'], ans:3, exp:'O feminino de leão é leoa!' },
  ],
  en: [
    { q:'How do you say "cachorro" in English?', opts:['Cat','Dog','Bird','Fish'], ans:1, exp:'"Dog" = cachorro. "Cat" = gato!' },
    { q:'What color is the sky?', opts:['Red','Green','Blue','Yellow'], ans:2, exp:'The sky is blue! Blue = azul.' },
    { q:'How many days in a week?', opts:['Five','Six','Seven','Eight'], ans:2, exp:'7 days: Monday through Sunday!' },
    { q:'What does "good morning" mean?', opts:['Boa tarde','Boa noite','Bom dia','Olá'], ans:2, exp:'"Good morning" = Bom dia!' },
    { q:'Opposite of "big"?', opts:['Fast','Small','Hot','Happy'], ans:1, exp:'"Small" is the opposite of "big"!' },
  ],
  writing: [
    { prompt:'Escreva 3 frases contando o que você fez no fim de semana. Use "primeiro", "depois" e "por fim".', tip:'💡 Dica: Pense em uma coisa de manhã, uma à tarde e uma à noite.', minWords:15 },
    { prompt:'Descreva seu animal favorito. Fale como ele é, onde vive e o que come.', tip:'💡 Dica: Comece com "Meu animal favorito é..." e use adjetivos como grande, pequeno, colorido, peludo.', minWords:15 },
    { prompt:'Você encontrou um tesouro escondido. Escreva o que estava dentro e o que você fez com ele.', tip:'💡 Dica: Use verbos no passado: encontrei, abri, vi, fiquei...', minWords:20 },
    { prompt:'Escreva uma pequena história com começo, meio e fim sobre uma criança que ajudou alguém.', tip:'💡 Dica: Começo = apresente o personagem. Meio = o problema. Fim = como resolveu.', minWords:25 },
    { prompt:'Escreva uma carta para um amigo imaginário contando sobre sua escola e sua turma.', tip:'💡 Dica: Cartas começam com "Querido(a)..." e terminam com "Com carinho," + seu nome.', minWords:20 },
  ],
};
window.QUESTIONS = QUESTIONS;

// ─── ESTADO ─────────────────────────────────────────
window.state = { cat:null, idx:0, pts:0, streak:0, done:0, answered:false };

// ─── RENDER ─────────────────────────────────────────
window.renderCats = function() {
  document.getElementById('cats').innerHTML = CATEGORIES.map(c => {
    const completed = userProgress?.categories?.[c.id]?.completed;
    return `<button class="cat-btn${state.cat===c.id?' active':''}${completed?' done-cat':''}" onclick="selectCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>${c.label}
      ${completed ? '<span class="cat-badge">✓</span>' : ''}
    </button>`;
  }).join('');
};

window.selectCat = function(id) {
  state.cat=id; state.idx=0; state.answered=false;
  renderCats(); renderQuestion();
};

window.renderQuestion = function() {
  const area = document.getElementById('quiz-area');
  if (!state.cat) { area.innerHTML='<p style="text-align:center;color:#888;font-size:15px;padding:1rem 0;">Escolha uma categoria acima para começar!</p>'; return; }
  const qs = QUESTIONS[state.cat];
  if (state.idx >= qs.length) { renderResult(); return; }
  document.getElementById('prog').style.width = Math.round((state.idx/qs.length)*100)+'%';
  state.cat==='writing' ? renderWriting(qs[state.idx]) : renderMCQ(qs[state.idx]);
};

window.renderMCQ = function(q) {
  const qs=QUESTIONS[state.cat]; const cat=CATEGORIES.find(c=>c.id===state.cat);
  document.getElementById('quiz-area').innerHTML=`
    <div class="question-card">
      <div class="q-meta"><span>${cat.icon} ${cat.label}</span><span>Pergunta ${state.idx+1} de ${qs.length}</span></div>
      <div class="q-text">${q.q}</div>
      <div class="options">${q.opts.map((o,i)=>`<button class="opt-btn" id="opt${i}" onclick="answer(${i})">${o}</button>`).join('')}</div>
      <div class="feedback" id="fb"></div>
      <button class="next-btn" id="nxt" onclick="next()">Próxima pergunta →</button>
    </div>`;
};

window.renderWriting = function(q) {
  const qs=QUESTIONS[state.cat];
  document.getElementById('quiz-area').innerHTML=`
    <div class="question-card">
      <div class="q-meta"><span>✏️ Redação</span><span>Atividade ${state.idx+1} de ${qs.length}</span></div>
      <div class="q-text">${q.prompt}</div>
      <div class="tip-box">${q.tip}</div>
      <textarea class="writing-area" id="wtxt" placeholder="Escreva aqui a sua resposta..." oninput="updateCount(${q.minWords})"></textarea>
      <div class="word-count" id="wcount">0 palavras (mínimo ${q.minWords})</div>
      <div class="loading-txt" id="wloading">✨ Avaliando sua redação com IA...</div>
      <div class="ai-feedback" id="wfb"></div>
      <button class="submit-btn" id="wsubmit" onclick="submitWriting()" disabled>Enviar para correção ✨</button>
      <button class="next-btn" id="nxt" onclick="next()">Próxima atividade →</button>
    </div>`;
};

window.updateCount = function(minWords) {
  const txt=document.getElementById('wtxt').value.trim();
  const words=txt?txt.split(/\s+/).length:0;
  document.getElementById('wcount').textContent=words+' palavra'+(words!==1?'s':'')+(words<minWords?` (mínimo ${minWords})`:'  ✓');
  document.getElementById('wsubmit').disabled=words<minWords;
};

window.submitWriting = async function() {
  const txt=document.getElementById('wtxt').value.trim();
  const q=QUESTIONS['writing'][state.idx];
  document.getElementById('wsubmit').disabled=true;
  document.getElementById('wloading').style.display='block';
  document.getElementById('wtxt').disabled=true;
  try {
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,
        system:'Você é um professor carinhoso e encorajador para crianças de 7-8 anos. Avalie a redação de forma positiva e motivadora. Aponte 2 pontos positivos e 1 sugestão simples de melhoria. Use linguagem fácil e emojis. Máximo 5 frases curtas. Nunca seja negativo.',
        messages:[{role:'user',content:`Tema: "${q.prompt}"\n\nRedação da criança:\n"${txt}"\n\nAvalie para uma criança de 7-8 anos.`}]})
    });
    const data=await resp.json();
    const text=data.content&&data.content[0]?data.content[0].text:'Muito bem! Você escreveu muito bem!';
    document.getElementById('wloading').style.display='none';
    const fb=document.getElementById('wfb'); fb.className='ai-feedback show';
    fb.innerHTML='<strong>✨ Correção do professor:</strong><br><br>'+text.replace(/\n/g,'<br>');
  } catch(e) {
    document.getElementById('wloading').style.display='none';
    const fb=document.getElementById('wfb'); fb.className='ai-feedback show';
    fb.innerHTML='✅ Parabéns por escrever! Continue praticando!';
  }
  state.pts+=15; state.done++;
  document.getElementById('pts').textContent=state.pts;
  document.getElementById('done').textContent=state.done;
  document.getElementById('nxt').className='next-btn show';
  await window._saveProgress(state.cat, 15, true);
};

window.answer = async function(i) {
  if(state.answered) return;
  state.answered=true;
  const q=QUESTIONS[state.cat][state.idx];
  document.querySelectorAll('.opt-btn').forEach(b=>b.disabled=true);
  document.getElementById('opt'+q.ans).classList.add('correct');
  state.done++;
  const correct = i===q.ans;
  if(correct){ document.getElementById('opt'+i).classList.add('correct'); state.pts+=10; state.streak++; document.getElementById('fb').className='feedback show ok'; document.getElementById('fb').textContent='✓ Correto! '+q.exp; }
  else{ document.getElementById('opt'+i).classList.add('wrong'); state.streak=0; document.getElementById('fb').className='feedback show nok'; document.getElementById('fb').textContent='✗ Quase! '+q.exp; }
  document.getElementById('pts').textContent=state.pts;
  document.getElementById('streak').textContent=state.streak;
  document.getElementById('done').textContent=state.done;
  document.getElementById('nxt').className='next-btn show';
  await window._saveProgress(state.cat, correct?10:0, correct);
};

window.next = function(){ state.idx++; state.answered=false; renderQuestion(); };

window.renderResult = async function() {
  document.getElementById('prog').style.width='100%';
  const cat=CATEGORIES.find(c=>c.id===state.cat);
  const catPts = userProgress?.categories?.[state.cat]?.totalPoints || 0;
  document.getElementById('quiz-area').innerHTML=`
    <div class="result-card">
      <div style="font-size:48px;margin-bottom:12px;">🏆</div>
      <h2>Parabéns!</h2>
      <p>Você terminou <strong>${cat.label}</strong><br>com <strong>${state.pts} pontos</strong> no total!</p>
      <p style="font-size:13px;color:#888;margin-bottom:1.5rem;">Seu progresso foi salvo na sua conta ☁️</p>
      <button class="restart-btn" onclick="restart()">Escolher outra categoria</button>
    </div>`;
  await window._saveCategoryComplete(state.cat, state.pts);
  renderCats();
};

window.restart = function(){ state.cat=null; state.idx=0; state.answered=false; renderCats(); renderQuestion(); };

// Service Worker
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js'); }
</script>
</body>
</html>
